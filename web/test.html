<!DOCTYPE html>
<!-- Dev smoke-test harness (not part of the app UI).

     Loaded headlessly by tests/smoke_browser.py. Boots the real app in an
     iframe, renders frames through the actual WebGL2 pipeline, runs a tiny
     real export through the WebSocket, then POSTs a report to /api/presets
     under the name "smoke-result" so the test runner can read it from disk. -->
<html lang="en">
<head><meta charset="utf-8"><title>running</title></head>
<body style="background:#111;color:#ddd;font:13px monospace;white-space:pre-wrap">
<iframe id="appFrame" src="/" style="width:1280px;height:800px;border:1px solid #444"></iframe>
<div id="log"></div>
<script>
// Dead-man switch: a parse error in the module below would otherwise be a
// silent timeout — post whatever we know before the runner's deadline.
window.__earlyErrors = [];
window.addEventListener('error', (e) => {
  window.__earlyErrors.push(
    `${e.message} @ ${(e.filename || '').split('/').pop()}:${e.lineno}`);
});
window.__postedReport = false;
setTimeout(() => {
  if (window.__postedReport) return;
  fetch('/api/presets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: 'smoke-result', params: {
      report: ['FAIL dead-man: '
        + (window.__earlyErrors.join(' | ') || 'hang (no JS error captured)')],
      failed: true,
    } }),
  });
}, 100000);
</script>
<script type="module">
const report = { steps: [], failed: false };
const log = (line) => {
  report.steps.push(line);
  document.getElementById('log').textContent = report.steps.join('\n');
};
const step = (name, ok, extra = '') => {
  if (!ok) report.failed = true;
  log(`${ok ? 'OK  ' : 'FAIL'} ${name}${extra ? ' — ' + extra : ''}`);
};

async function post(name) {
  window.__postedReport = true;
  await fetch('/api/presets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, params: { report: report.steps, failed: report.failed } }),
  });
}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

async function main() {
  // 1 — the real app boots in the iframe (catches module/wiring errors)
  await new Promise((r) => {
    const f = document.getElementById('appFrame');
    if (f.contentDocument && f.contentDocument.readyState === 'complete') r();
    else f.addEventListener('load', r);
  });
  await sleep(2000);
  const idoc = document.getElementById('appFrame').contentDocument;
  const { STYLE_PACKS } = await import('./js/packs.js');
  step('look packs available', STYLE_PACKS.length >= 8, `${STYLE_PACKS.length} looks`);
  step('app boots: device chain built',
    idoc.querySelectorAll('#paramPanels .group').length >= 8,
    `${idoc.querySelectorAll('#paramPanels .group').length} devices in chain`);
  step('app boots: add-device browser present',
    !!idoc.querySelector('#paramPanels .add-device-btn'));
  // [hidden] must beat author display: (mod strips start collapsed)
  const strips = [...idoc.querySelectorAll('.mod-strip')];
  step('mod strips start collapsed ([hidden] enforced)',
    strips.length > 0
      && strips.every((s) => idoc.defaultView.getComputedStyle(s).display === 'none'),
    `${strips.length} strips`);
  step('modulation editor + ergonomics built',
    idoc.querySelectorAll('.mod-strip .mod-select').length > 0
      && idoc.querySelectorAll('.mod-strip .mod-meter').length > 0
      && !!idoc.querySelector('.dev-search')
      && !!idoc.querySelector('.device-reset'),
    `${idoc.querySelectorAll('.mod-strip .mod-select').length} editors`);
  step('app boots: aspect buttons', idoc.querySelectorAll('#aspectSeg button').length === 3);
  step('R6 UI present (media card / swap / export pill+hide)',
    !!idoc.getElementById('mediaCard') && !!idoc.getElementById('swapImageBtn')
      && !!idoc.getElementById('exportPill') && !!idoc.getElementById('exportHide'));
  step('replace-audio control present (media card)',
    !!idoc.getElementById('replaceAudioBtn') && !!idoc.getElementById('replaceAudioInput'));
  step('R4/R5 UI present (canvas / device chain always visible)',
    !!idoc.getElementById('canvasFill')
      && !idoc.getElementById('viewToggle')
      && !!idoc.querySelector('#paramPanels [data-key="canvasOn"]'));
  step('R9/R10 UI present (Library / signal tiers / spectrum)',
    !!idoc.getElementById('librarySection')
      && idoc.querySelectorAll('#signalPanel .signal-tier').length >= 2
      && !!idoc.getElementById('spectrumCanvas'));
  step('R10 input model (Audio + Visual source, guided preview, no dead controls)',
    !!idoc.getElementById('canvasFill') && !!idoc.getElementById('audioInput')
      && !!idoc.getElementById('imageInput') && !!idoc.getElementById('startCallout')
      && !idoc.querySelector('#dropHint button')
      && !!idoc.getElementById('leftResize') && !!idoc.getElementById('sourcePreview'));
  step('R10 export summary + signal + shortcuts present',
    !!idoc.getElementById('exportSummary')
      && !!idoc.getElementById('signalBtn')
      && !!idoc.getElementById('shortcutsBtn'));
  step('auto colour-grade: Auto button on the Grade device header',
    !!idoc.querySelector('#paramPanels .device-auto'));
  // R10-4 fix: the dimmed-off state must clear when a device is switched on
  const canvasSum = idoc.querySelector('#paramPanels summary[data-key="canvasOn"]');
  const canvasCard = canvasSum && canvasSum.closest('details.group');
  const canvasCb = canvasSum && canvasSum.querySelector('input[type="checkbox"]');
  let offClears = false;
  if (canvasCard && canvasCb) {
    const wasOff = canvasCard.classList.contains('device-off');
    canvasCb.checked = true; canvasCb.dispatchEvent(new Event('change'));
    offClears = wasOff && !canvasCard.classList.contains('device-off');
    canvasCb.checked = false; canvasCb.dispatchEvent(new Event('change')); // restore
  }
  step('device dimmed-off state clears when switched on', offClears);
  // Racks parked (WIP, 2026-06-21): the rack UI is hidden from the frontend
  // while the engine stays dormant. #macroRack renders nothing and is hidden,
  // and the Rack-presets library section is hidden. (Engine behaviour is still
  // covered by the pure/state-level rack tests further down.)
  step('racks parked: #macroRack hidden + empty',
    idoc.getElementById('macroRack').hidden === true
      && idoc.querySelectorAll('#macroRack .rack-card, #macroRack .rack-add, #macroRack .macro-empty').length === 0);
  step('racks parked: no Load rack / + Rack controls rendered',
    !idoc.querySelector('[data-add-rack]')
      && !idoc.querySelector('[data-rack-id]')
      && ![...idoc.querySelectorAll('#macroRack button')].some((b) => b.textContent.trim() === 'Load rack'));
  step('racks parked: Rack-presets library section hidden',
    !!idoc.getElementById('rackLibrary') && idoc.getElementById('rackLibrary').hidden === true);
  step('parked preset UI hidden', idoc.querySelector('#savePresetBtn') === null
    || idoc.querySelector('#savePresetBtn').offsetParent === null);
  step('R7 UI present (Style dropdown gone / inline focus toggle removed / master)',
    !idoc.getElementById('packSelect')
      && !idoc.querySelector('.focus-toggle')
      && !!idoc.querySelector('#paramPanels [data-key="sharpOn"]')
      && !!idoc.querySelector('#paramPanels [data-key="outputOn"]'));
  step('snapshots retired: no Snapshots UI',
    idoc.getElementById('snapshotSection') === null
      && idoc.getElementById('snapshotSave') === null
      && idoc.getElementById('snapshotList') === null);
  step('R8: A/B fully removed from UI',
    !idoc.getElementById('abBtn') && !idoc.getElementById('abCopy'));
  step('R8: Signal panel present + Audio Response out of device stack',
    !!idoc.getElementById('signalBtn') && !!idoc.getElementById('spectrumCanvas')
      && !idoc.querySelector('#paramPanels [data-key="audReact"]'));
  step('R8: Master section has a distinct divider',
    !!idoc.querySelector('.master-divider') && !!idoc.querySelector('details.group.master'));
  step('app boots: no window error', !idoc.title.startsWith('ERR'), idoc.title);

  // Timeline waveform (Spec 1) — WaveformPeaks pure logic
  {
    const { WaveformPeaks } = await import('./js/waveform.js');

    // raw path (samplesPerCol < BUCKET=512): constant 0.2 with a transient block
    const sr1 = 1000, n1 = 1000;
    const ch1 = new Float32Array(n1).fill(0.2);
    for (let i = 500; i < 520; i++) ch1[i] = 1.0;
    const wp1 = new WaveformPeaks([ch1], sr1);
    const c1 = wp1.columns(0, 1, 10); // fine zoom: a few columns share a bucket
    step('waveform: columns returns 3 Float32Arrays of width length',
      c1.min.length === 10 && c1.max.length === 10 && c1.rms.length === 10
        && c1.max instanceof Float32Array);
    step('waveform: captures a transient at fine zoom (bucket aggregation)',
      c1.max[5] > 0.9 && c1.max[0] < 0.3 && Math.abs(c1.rms[0] - 0.2) < 1e-2,
      `max5=${c1.max[5].toFixed(2)} max0=${c1.max[0].toFixed(2)} rms0=${c1.rms[0].toFixed(2)}`);

    // wide zoom: a column spans many buckets
    const sr2 = 2000, n2 = 8000;
    const ch2 = new Float32Array(n2).fill(0.1);
    for (let i = 4000; i < 4100; i++) ch2[i] = 1.0;
    const wp2 = new WaveformPeaks([ch2], sr2);
    const c2 = wp2.columns(0, 4, 8); // samplesPerCol = 1000 >= 512 → buckets
    step('waveform: bucket path surfaces the transient',
      c2.max[4] > 0.9 && c2.max[0] < 0.2,
      `max4=${c2.max[4].toFixed(2)} max0=${c2.max[0].toFixed(2)}`);

    // mono averaging of two channels: avg(0.8, 0.2) = 0.5
    const L = new Float32Array(2000).fill(0.8);
    const R = new Float32Array(2000).fill(0.2);
    const cm = new WaveformPeaks([L, R], 1000).columns(0, 2, 4);
    step('waveform: averages channels to mono',
      Math.abs(cm.max[0] - 0.5) < 1e-3 && Math.abs(cm.rms[0] - 0.5) < 1e-3,
      `max=${cm.max[0].toFixed(3)} rms=${cm.rms[0].toFixed(3)}`);

    // empty buffer → zero columns, no throw
    const ce = new WaveformPeaks([new Float32Array(0)], 1000).columns(0, 1, 5);
    step('waveform: empty buffer yields zero columns (no throw)',
      ce.max.length === 5 && ce.max.every((v) => v === 0));
  }

  // Trigger detection foundation (Slice 1a) — pure selectivity filter
  {
    const { detectTriggers } = await import('./js/features.js');
    // strengths 0.2..1.0; selectivity 0 keeps most, 1 keeps only the strongest
    const cands = [[0.0, 1.0], [0.5, 0.3], [1.0, 0.9], [1.5, 0.2], [2.0, 0.6]];
    const loose = detectTriggers(cands, 0.0);
    const tight = detectTriggers(cands, 1.0);
    step('triggers: detectTriggers returns {t,s} objects',
      loose.length > 0 && typeof loose[0].t === 'number' && typeof loose[0].s === 'number');
    step('triggers: higher selectivity keeps fewer (only the strongest)',
      tight.length < loose.length && tight.every((x) => x.s >= 0.85),
      `loose=${loose.length} tight=${tight.length}`);
    // 60 ms min-gap: two near-coincident candidates collapse to the stronger
    const near = detectTriggers([[1.000, 0.6], [1.030, 0.9]], 0.0);
    step('triggers: min-gap keeps the stronger of near-coincident pair',
      near.length === 1 && Math.abs(near[0].s - 0.9) < 1e-6, `n=${near.length}`);
    // empty / missing band → empty array, no throw
    step('triggers: empty candidates yield empty array',
      detectTriggers([], 0.5).length === 0 && detectTriggers(undefined, 0.5).length === 0);
  }

  // Slice 1b — trigger-set recipe + Signal Triggers section
  {
    const W = idoc.defaultView;
    step('triggers1b: __triggers hook + Triggers section present',
      !!W.__triggers && !!idoc.getElementById('signalTriggers'));
    if (W.__triggers) {
      const bank = { triggerCandidates: { low: [[0.0, 1.0], [0.5, 0.3], [1.0, 0.9]] } };
      const set = { id: 't1', name: 'Low', band: 'low', selectivity: 0.0, color: '#6cf', show: true };
      const derived = W.__triggers.deriveTriggerSet(set, bank);
      step('triggers1b: deriveTriggerSet derives [{t,s}] from candidates+selectivity',
        derived.length === 3 && derived[0].t === 0.0 && typeof derived[0].s === 'number',
        `n=${derived.length}`);
      const tight = W.__triggers.deriveTriggerSet({ ...set, selectivity: 1.0 }, bank);
      step('triggers1b: higher selectivity derives fewer', tight.length < derived.length,
        `loose=${derived.length} tight=${tight.length}`);
    }
  }

  // Slice 2 — trigger modulation envelope + source resolution
  {
    const { triggerEnvelope, FeatureBank: FB2, applyModulation: applyMod2 } = await import('./js/features.js');
    const sorted = [{ t: 1.0, s: 1.0 }, { t: 2.0, s: 0.5 }];
    step('triggers2: envelope is 0 before the first trigger',
      triggerEnvelope(sorted, 0.2, 0.5) === 0);
    step('triggers2: envelope = strength at the trigger',
      Math.abs(triggerEnvelope(sorted, 0.2, 1.0) - 1.0) < 1e-6);
    step('triggers2: envelope decays to ~s/e one decay later',
      Math.abs(triggerEnvelope(sorted, 0.2, 1.2) - Math.exp(-1)) < 1e-3,
      `${triggerEnvelope(sorted, 0.2, 1.2).toFixed(3)}`);
    step('triggers2: deterministic at arbitrary t (order-independent)',
      triggerEnvelope(sorted, 0.2, 2.05) === triggerEnvelope(sorted, 0.2, 2.05));
    const bank2 = new FB2({ frameRate: 50, frames: 10, duration: 2, tempo: 0, beatOffset: 0,
      rms: [0], low: [0], mid: [0], high: [0], onsetEnv: [0], onsets: [], sections: [0],
      triggers: { low: [] }, bands: null, bandEdges: null });
    bank2.setTriggerSources([{ id: 'A', triggers: [{ t: 1.0, s: 1.0 }], decay: 0.2 }]);
    const f = bank2.sample(1.0);
    step('triggers2: sample().trg carries the envelope', Math.abs(f.trg.A - 1.0) < 1e-6, `${f.trg && f.trg.A}`);
    const SC = (await import('./js/params.js')).paramIndex();
    const tgt = Object.keys(SC).find((k) => SC[k] && !SC[k].type && SC[k].automatable);
    const p0 = { [tgt]: SC[tgt].min, [`${tgt}~trg:A`]: 1, audReact: 1 };
    const moved = applyMod2(p0, f);
    step('triggers2: applyModulation moves a target from a trg: source',
      moved[tgt] > SC[tgt].min, `${tgt}: ${SC[tgt].min} -> ${moved[tgt]}`);
  }

  // Slice 2 — trigger sets appear as routable modulation sources
  {
    const W = idoc.defaultView;
    W.__triggers.state.triggerSets = [{ id: 'Z9', name: 'KickZ', band: 'low', selectivity: 0.5, color: '#6cf', show: true, decay: 0.18 }];
    step('triggers2: getModSources includes trigger sets',
      !!W.__getModSources && W.__getModSources().some((s) => s.value === 'trg:Z9' && s.label === 'KickZ'));
    W.__panelRebuild();
    const opts = [...idoc.querySelectorAll('#paramPanels .mod-select option')].map((o) => o.value);
    step('triggers2: mod dropdown lists the trigger set', opts.includes('trg:Z9'), `opts=${opts.length}`);
    W.__triggers.state.triggerSets = []; W.__panelRebuild();
    // deleting a set sweeps its stale depth keys
    W.__triggers.state.params = W.__triggers.state.params || {};
    W.__triggers.state.params['exposure~trg:D1'] = 0.5;
    W.__triggers.state.params['exposure~trg:D1@th'] = 0.2;
    W.__triggers.sweepDeletedSource('D1');
    step('triggers2: deleting a set sweeps its depth keys',
      W.__triggers.state.params['exposure~trg:D1'] === undefined
        && W.__triggers.state.params['exposure~trg:D1@th'] === undefined);
  }

  // Reactive S3 — direct manipulation of the active set's markers on the body
  {
    const W = idoc.defaultView; const tl = W.__timeline;
    const set = { id: 'ed', name: 'Ed', band: 'low', selectivity: null, color: '#f55', show: true, decay: 0.18, dynamics: 'manual', pins: [], suppress: [] };
    const realDraw = tl.draw.bind(tl), realBank = tl.bank, realE = tl.onTriggerEdit, realC = tl.onTriggerCommit, realTS = tl.triggerSets, realLane = tl.laneKey, realAct = tl.activeSet;
    let committed = 0;
    const syncOverlay = () => { tl.triggerSets = [{ id: set.id, color: set.color, active: true, markers: set.pins.map((p) => ({ t: p.t, s: p.s, pinned: true })) }]; };
    tl.draw = () => {}; tl.bank = { duration: 4 }; tl.laneKey = null;
    tl.duration = 4; tl.pxPerSec = 0; tl.viewStart = 0; tl.time = 0;
    tl.canvas.setPointerCapture = () => {}; tl.canvas.releasePointerCapture = () => {};
    tl.onTriggerEdit = () => { syncOverlay(); }; tl.onTriggerCommit = () => { committed++; };
    tl.setActiveTriggerSet(set); syncOverlay();
    step('rtrig3: setActiveTriggerSet arms body editing', tl.activeSet === set);
    const r = tl.canvas.getBoundingClientRect();
    const at = (px, fy = 0.5) => ({ button: 0, altKey: true, shiftKey: false, pointerId: 1, preventDefault() {},
      clientX: r.left + px / tl.dpr, clientY: r.top + tl.canvas.height * fy / tl.dpr });
    // click empty space → add a pin, drag it to a new x, release
    tl._down(at(tl.canvas.width * 0.3)); tl._applyDrag(at(tl.canvas.width * 0.6)); tl._up(at(tl.canvas.width * 0.6));
    step('rtrig3: click-add then drag creates one pin + commits', set.pins.length === 1 && committed > 0, `pins=${set.pins.length}`);
    // right-click the pin → removed
    tl._deleteAt(at(tl.xOf(set.pins[0].t)));
    step('rtrig3: right-click removes the pin', set.pins.length === 0);
    tl.draw = realDraw; tl.bank = realBank; tl.onTriggerEdit = realE; tl.onTriggerCommit = realC;
    tl.triggerSets = realTS; tl.laneKey = realLane; tl.setActiveTriggerSet(realAct);
  }

  // Reactive S3 — persistence round-trip + undo (pins model)
  {
    const W = idoc.defaultView, T = W.__triggers;
    const before = T.state.triggerSets.slice();
    T.state.triggerSets = [{ id: 'pp', name: 'P', band: 'mid', selectivity: null, color: '#6cf', show: true, decay: 0.2, dynamics: 'detected', pins: [{ t: 1.25, s: 0.7 }], suppress: [] }];
    const saved = (JSON.parse(W.__buildSessionPayload()).triggerSets || [])[0];
    step('triggers3: session payload round-trips edited pins',
      !!saved && saved.pins && saved.pins[0].t === 1.25 && saved.pins[0].s === 0.7,
      JSON.stringify(saved && saved.pins));

    // undo reverts a trigger edit via the history snapshot (pins model)
    T.state.triggerSets = [{ id: 'uz', name: 'U', band: 'low', selectivity: null, color: '#6cf', show: true, decay: 0.18, dynamics: 'detected', pins: [{ t: 1, s: 0.5 }], suppress: [] }];
    W.__commitHistory();
    T.state.triggerSets[0].pins.push({ t: 2, s: 0.8 });
    W.__commitHistory();
    W.__undo();
    step('triggers3: undo reverts a trigger edit',
      !!T.state.triggerSets[0] && T.state.triggerSets[0].pins.length === 1,
      `n=${T.state.triggerSets[0] && T.state.triggerSets[0].pins.length}`);
    T.state.triggerSets = before; // restore for later tests
  }

  // Reactive triggers Slice 1 — active-set selection + timeline emphasis
  {
    const W = idoc.defaultView, T = W.__triggers;
    const before = T.state.triggerSets.slice(), bank0 = T.state.bank, active0 = T.state.activeTriggerSet;
    T.state.bank = T.state.bank || { duration: 4 };
    T.state.triggerSets = [
      { id: 'a', name: 'A', band: 'low', selectivity: 0.5, color: '#6cf', show: true, decay: 0.18, triggers: [{ t: 1, s: 0.5 }] },
      { id: 'b', name: 'B', band: 'mid', selectivity: 0.5, color: '#fc6', show: true, decay: 0.18, triggers: [{ t: 2, s: 0.6 }] },
    ];
    W.__setActiveTrigger('a');
    step('rtrig1: selecting a set sets it active', T.state.activeTriggerSet === 'a');
    const ov = W.__triggerOverlayPayload();
    const aOn = ov.find((s) => s.id === 'a'), bOff = ov.find((s) => s.id === 'b');
    step('rtrig1: overlay flags the active set',
      !!aOn && aOn.active === true && !!bOff && bOff.active === false,
      JSON.stringify(ov.map((s) => [s.id, s.active])));
    W.__setActiveTrigger('a'); // toggles off
    step('rtrig1: clicking the active set again clears it', T.state.activeTriggerSet === null);
    T.state.triggerSets = before; T.state.bank = bank0; T.state.activeTriggerSet = active0;
  }

  // Reactive triggers Slice 1 — live Selectivity re-tune
  {
    const W = idoc.defaultView;
    const bank = { triggerCandidates: { low: [[0.5, 1.0], [1.0, 0.5], [1.5, 0.2], [2.0, 0.12]] } };
    const set = { id: 'sel', name: 'S', band: 'low', selectivity: 0.0, color: '#6cf', show: true, decay: 0.18, pins: [], suppress: [], dynamics: 'detected' };
    const lo = W.__retune(set, bank, 0.0).length;   // permissive → more
    const hi = W.__retune(set, bank, 0.95).length;  // strict → fewer
    step('rtrig1: live selectivity changes resolved count', lo > hi && set.selectivity === 0.95, `lo=${lo} hi=${hi}`);
  }

  // Reactive S2 — resolveTriggers model
  {
    const W = idoc.defaultView;
    const { resolveTriggers } = await import('./js/features.js');
    const bank = { triggerCandidates: { low: [[0.5, 0.9], [1.0, 0.6], [1.5, 0.3]] } };
    let r = resolveTriggers({ band: 'low', selectivity: 0.0, pins: [], suppress: [], dynamics: 'detected' }, bank);
    step('rtrig2: auto markers resolve from selectivity', r.length === 3 && r.every((m) => !m.pinned), `n=${r.length}`);
    r = resolveTriggers({ band: 'low', selectivity: null, pins: [{ t: 2, s: 0.7 }], suppress: [], dynamics: 'detected' }, bank);
    step('rtrig2: null selectivity = auto off, pins only', r.length === 1 && r[0].pinned === true && r[0].t === 2);
    r = resolveTriggers({ band: 'low', selectivity: 0.0, pins: [{ t: 1.0, s: 1 }], suppress: [0.5], dynamics: 'detected' }, bank);
    step('rtrig2: suppress drops auto + pin wins on collision',
      r.length === 2 && !r.some((m) => Math.abs(m.t - 0.5) < 0.02) && r.find((m) => m.t === 1.0).pinned === true,
      JSON.stringify(r));
    r = resolveTriggers({ band: 'low', selectivity: 0.0, pins: [], suppress: [], dynamics: 'uniform' }, bank);
    step('rtrig2: uniform dynamics forces strength 1', r.length === 3 && r.every((m) => m.s === 1));
    const set = { id: 'm', band: 'low', selectivity: 0.5, triggers: [{ t: 3, s: 0.8 }] };
    W.__normalizeTriggerSet(set);
    step('rtrig2: migrate triggers[] -> pins, auto off',
      Array.isArray(set.pins) && set.pins.length === 1 && set.pins[0].t === 3 && set.selectivity === null && set.dynamics === 'detected' && set.triggers === undefined,
      JSON.stringify(set));
  }

  // Reactive S2 — overlay payload tags auto vs pinned
  {
    const W = idoc.defaultView, T = W.__triggers;
    const before = T.state.triggerSets.slice(), bank0 = T.state.bank, active0 = T.state.activeTriggerSet;
    T.state.bank = { triggerCandidates: { low: [[0.5, 0.9], [1.0, 0.6]] }, duration: 4 };
    T.state.triggerSets = [{ id: 'mix', name: 'M', band: 'low', selectivity: 0.0, color: '#6cf', show: true, decay: 0.18, dynamics: 'detected', pins: [{ t: 3, s: 0.5 }], suppress: [] }];
    const ov = W.__triggerOverlayPayload()[0];
    step('rtrig2: overlay markers tag auto vs pinned',
      ov.markers.length === 3 && ov.markers.filter((m) => m.pinned).length === 1 && ov.markers.filter((m) => !m.pinned).length === 2,
      JSON.stringify(ov.markers.map((m) => [m.t, m.pinned])));
    // dynamics uniform forces overlay strengths to 1
    T.state.triggerSets = [{ id: 'dy', name: 'D', band: 'low', selectivity: 0.0, color: '#6cf', show: true, decay: 0.18, dynamics: 'uniform', pins: [], suppress: [] }];
    const ovU = W.__triggerOverlayPayload()[0];
    step('rtrig2: dynamics uniform → overlay strengths all 1', ovU.markers.length === 2 && ovU.markers.every((m) => m.s === 1));
    T.state.triggerSets = before; T.state.bank = bank0; T.state.activeTriggerSet = active0;
  }

  // Reactive S2 — decay shape preview helper
  {
    const W = idoc.defaultView;
    const sum = (a) => a.reduce((x, y) => x + y, 0);
    const cLo = W.__decayCurve(0.05), cHi = W.__decayCurve(0.8);
    step('rtrig2: decay curve starts at peak + larger decay = longer tail',
      cLo[0] === 1 && cHi[0] === 1 && sum(cHi) > sum(cLo) && cHi[cHi.length - 1] > cLo[cLo.length - 1],
      `lo=${sum(cLo).toFixed(2)} hi=${sum(cHi).toFixed(2)}`);
  }

  // Reactive S3 — progressive disclosure (active set expands an editor panel)
  {
    const W = idoc.defaultView, T = W.__triggers;
    const before = T.state.triggerSets.slice(), bank0 = T.state.bank, a0 = T.state.activeTriggerSet;
    T.state.bank = { triggerCandidates: { low: [[0.5, 0.9]] }, duration: 4 };
    T.state.triggerSets = [
      { id: 'e1', name: 'E1', band: 'low', selectivity: 0.5, color: '#6cf', show: true, decay: 0.18, dynamics: 'detected', pins: [], suppress: [] },
      { id: 'e2', name: 'E2', band: 'mid', selectivity: 0.5, color: '#fc6', show: true, decay: 0.18, dynamics: 'detected', pins: [], suppress: [] },
    ];
    W.__setActiveTrigger('e1');
    const box = idoc.getElementById('signalTriggers');
    step('rtrig3: active set shows exactly one editor panel', box.querySelectorAll('.trg-editor').length === 1);
    step('rtrig3: editor has a customization hint', !!box.querySelector('.trg-editor .trg-hint'));
    W.__setActiveTrigger('e1'); // toggle off
    step('rtrig3: no editor when nothing active', box.querySelectorAll('.trg-editor').length === 0);
    T.state.triggerSets = before; T.state.bank = bank0; T.state.activeTriggerSet = a0;
    if (W.__rebuildTriggers) W.__rebuildTriggers();
  }

  // Timeline waveform — render integration via the __timeline hook
  {
    const W = idoc.defaultView;
    const tl = W.__timeline;
    step('waveform: timeline hook exposed', !!tl && !!tl.canvas);
    if (tl && tl.canvas) {
      const { WaveformPeaks } = await import('./js/waveform.js');
      const w = tl.canvas.width, h = tl.canvas.height;

      // no-op guard: no waveform set → _drawWave must not throw
      tl.wave = null;
      let threw = false;
      try { tl._drawWave(w, h, tl.dpr); } catch (e) { threw = true; }
      step('waveform: _drawWave no-ops without a waveform', !threw);

      // synthetic 4s buffer with on-beat transients
      const sr = 8000, secs = 4, N = sr * secs;
      const ch = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        const t = i / sr, ph = (t * 4) % 1;
        ch[i] = Math.sin(t * 900) * (0.15 + 0.7 * Math.exp(-ph * 6));
      }
      tl.duration = secs; tl.pxPerSec = 0; tl.viewStart = 0; tl.time = 0;
      tl.setWaveform(new WaveformPeaks([ch], sr));
      step('waveform: setWaveform stores it', tl.wave instanceof WaveformPeaks);

      // paint just the wave and count painted pixels in the wave band
      tl.ctx.clearRect(0, 0, w, h);
      tl._drawWave(w, h, tl.dpr);
      const band = tl.ctx.getImageData(0, Math.floor(h * 0.45), w, Math.max(Math.floor(h * 0.1), 1)).data;
      let painted = 0;
      for (let i = 3; i < band.length; i += 4) if (band[i] > 0) painted++;
      step('waveform: style B paints the wave band', painted > 50, `painted=${painted}`);

      // regression (bug 2026-06-25): zooming must not change the vertical scale.
      // The old per-view normalization made the waveform expand as you zoomed in
      // until it overflowed the pane and blanked (and, at extreme zoom, collapsed
      // to a flat line). With a fixed song-wide scale + bucket aggregation the
      // height is stable. Uniform 0.12 tone → same height at every zoom.
      const sr3 = 8000, secs3 = 8, M = sr3 * secs3;
      const quiet = new Float32Array(M);
      for (let i = 0; i < M; i++) quiet[i] = Math.sin(i / sr3 * 900) * 0.12;
      tl.duration = secs3; tl.time = 4; tl.laneKey = null;
      tl.setWaveform(new WaveformPeaks([quiet], sr3));
      const bandH = h - 26 * tl.dpr;
      const waveExtent = () => {
        tl.ctx.clearRect(0, 0, w, h);
        tl._drawWave(w, h, tl.dpr);
        const d = tl.ctx.getImageData(0, 0, w, h).data;
        let yMin = h, yMax = 0;
        for (let y = 0; y < h; y++) for (let x = 0; x < w; x += 11) { const i = (y * w + x) * 4; if (d[i] > 30 || d[i + 1] > 30 || d[i + 2] > 40) { if (y < yMin) yMin = y; if (y > yMax) yMax = y; break; } }
        return yMax - yMin;
      };
      tl.viewStart = 3.4; tl.pxPerSec = w / (tl.dpr * 0.2); // ~0.2s window (extreme zoom)
      const eDeep = waveExtent();
      step('waveform: stays legible at deep zoom (no collapse, no blank)',
        eDeep > bandH * 0.4 && eDeep <= bandH + 2, `extent=${eDeep} band=${bandH.toFixed(0)}`);
      tl.viewStart = 1; tl.pxPerSec = w / (tl.dpr * 4); // ~4s window
      const eWide = waveExtent();
      step('waveform: vertical scale is stable across zoom (does not expand)',
        Math.abs(eDeep - eWide) <= bandH * 0.3, `deep=${eDeep} wide=${eWide} band=${bandH.toFixed(0)}`);

      tl.setWaveform(null); // restore clean state for later tests

      // Slice 1b — trigger overlay paints colored ticks
      tl.duration = 4; tl.pxPerSec = 0; tl.viewStart = 0; tl.wave = null;
      tl.setBank({ duration: 4, onsets: [], sections: [0] });
      tl.setTriggerSets([{ color: '#ff5050', triggers: [{ t: 1, s: 1 }, { t: 2, s: 1 }, { t: 3, s: 1 }] }]);
      tl.draw();
      const trd = tl.ctx.getImageData(0, 0, tl.canvas.width, tl.canvas.height).data;
      let red = 0;
      for (let i = 0; i < trd.length; i += 4) if (trd[i] > 150 && trd[i + 1] < 110 && trd[i + 2] < 110) red++;
      step('triggers1b: timeline overlay paints colored ticks', red > 5, `red=${red}`);
      tl.setTriggerSets([]); tl.draw();
    }
  }

  // Item 3 — Focus is a local UI pref, not project state.
  step('item3: focus removed from session payload',
    !('focus' in JSON.parse(idoc.defaultView.__buildSessionPayload())),
    Object.keys(JSON.parse(idoc.defaultView.__buildSessionPayload())).join(','));
  step('item3: focus defaults on at boot',
    idoc.defaultView.__racks.state.focus === true,
    `state.focus=${idoc.defaultView.__racks.state.focus}`);

  // Item 3 — Settings gear + popover + persistence.
  const setBtn = idoc.getElementById('settingsBtn');
  step('item3: settings gear present', !!setBtn);
  let popOpened = false, hasFocusCb = false, persisted = false, popClosed = false;
  if (setBtn) {
    setBtn.click();
    const pop = idoc.querySelector('.settings-pop');
    popOpened = !!pop;
    const cb = pop && pop.querySelector('input[type="checkbox"]');
    hasFocusCb = !!cb;
    if (cb) {
      const before = idoc.defaultView.__racks.state.focus;
      cb.checked = !before;
      cb.dispatchEvent(new idoc.defaultView.Event('change', { bubbles: true }));
      const prefs = JSON.parse(idoc.defaultView.localStorage.getItem('sr:ui-prefs') || '{}');
      persisted = idoc.defaultView.__racks.state.focus === !before && prefs.focus === !before;
      // restore the default-on state
      cb.checked = true;
      cb.dispatchEvent(new idoc.defaultView.Event('change', { bubbles: true }));
    }
    setBtn.click(); // re-click toggles the popover closed
    popClosed = !idoc.querySelector('.settings-pop');
  }
  step('item3: settings popover opens with a Focus checkbox', popOpened && hasFocusCb);
  step('item3: toggling Focus persists to sr:ui-prefs + state', persisted);
  step('item3: re-clicking the gear closes the popover', popClosed);

  // Slice 1b — Settings popover gains a "Show trigger overlays" toggle
  step('triggers1b: Settings has a Show-trigger-overlays toggle', (() => {
    const sb = idoc.getElementById('settingsBtn');
    sb.click();
    const pop = idoc.querySelector('.settings-pop');
    const has = pop && /trigger overlays/i.test(pop.textContent);
    sb.click();
    return !!has;
  })());

  // 2 — render frames through the real pipeline
  const { Renderer } = await import('./js/renderer.js');
  const { FeatureBank } = await import('./js/features.js');
  const { defaultParams } = await import('./js/params.js');
  step('defaultParams no longer seeds global macro1..8',
    defaultParams().macro1 === undefined && defaultParams().macro8 === undefined);
  const { getPack } = await import('./js/packs.js');
  const { runExport } = await import('./js/export.js');

  const projects = await fetch('/api/projects').then((r) => r.json());
  step('project available', projects.length > 0);
  // Prefer the synthetic test fixture (test.png) for pixel-level assertions.
  const fixture = projects.find((p) => p.imageName === 'test.png') || projects[0];
  const pid = fixture.id;

  const [imgBlob, depthBlob, analysis] = await Promise.all([
    fetch(`/api/project/${pid}/image`).then((r) => r.blob()),
    fetch(`/api/project/${pid}/depth`).then((r) => r.blob()),
    fetch(`/api/project/${pid}/analysis`).then((r) => r.json()),
  ]);
  const canvas = document.createElement('canvas');
  canvas.width = 384; canvas.height = 216;
  const renderer = new Renderer(canvas);
  renderer.setImage(await createImageBitmap(imgBlob, { imageOrientation: 'flipY' }));
  renderer.setDepth(await createImageBitmap(depthBlob, { imageOrientation: 'flipY' }));
  renderer.setSize(384, 216);
  step('renderer + shaders compiled in browser', true);

  const bank = new FeatureBank(analysis);
  bank.setResponse({});
  const params = { ...defaultParams(), ...getPack('cinematic').overrides };
  const reframe = { x: 0, y: 0, scale: 1 };
  for (let i = 0; i < 30; i++) {
    const t = i / 30;
    renderer.render(t, 1 / 30, bank.sample(t), params, reframe, { toTexture: true });
  }
  const px = renderer.readPixels();
  let sum = 0, sum2 = 0, n = 0;
  for (let i = 0; i < px.length; i += 401) { sum += px[i]; sum2 += px[i] * px[i]; n++; }
  const mean = sum / n;
  const sd = Math.sqrt(Math.max(sum2 / n - mean * mean, 0));
  step('rendered frames are non-trivial', mean > 4 && sd > 4,
    `mean=${mean.toFixed(1)} sd=${sd.toFixed(1)}`);

  // orientation: the fixture image is redder at its bottom; readPixels row 0
  // is the frame's bottom row, so bottom rows must out-red the top rows.
  const W = 384, H = 216, rowsN = 30;
  let redBottom = 0, redTop = 0;
  for (let y = 0; y < rowsN; y++) {
    for (let x = 0; x < W; x += 7) {
      redBottom += px[(y * W + x) * 4];
      redTop += px[((H - 1 - y) * W + x) * 4];
    }
  }
  step('orientation correct (image not flipped)', redBottom > redTop * 1.15,
    `bottom=${Math.round(redBottom / 1000)}k top=${Math.round(redTop / 1000)}k`);

  // 3 — feature sanity
  const f = bank.sample(1.0);
  step('features sampled', [f.low, f.mid, f.high, f.rms, f.onset].every((v) => v >= 0 && v <= 1.5),
    JSON.stringify({ low: +f.low.toFixed(2), high: +f.high.toFixed(2), beats: +f.beats.toFixed(1) }));

  // 3b — device Intensity faders: intensity 0 must equal the device being off
  const { paramIndex } = await import('./js/params.js');
  step('paramIndex no longer lists global macro1..8',
    paramIndex().macro1 === undefined && paramIndex().macro8 === undefined);

  // 3c -- rack macro key helper
  const { rackMacroKey, MACRO_SLOTS } = await import('./js/params.js');
  step('rackMacroKey builds per-rack macro keys',
    rackMacroKey('rk1', 1) === 'rk1.m1' && rackMacroKey('rk2', 8) === 'rk2.m8'
    && MACRO_SLOTS === 8,
    `${rackMacroKey('rk1', 1)} / slots=${MACRO_SLOTS}`);

  // Task 4.3 -- rackToSaved + applyRackToState pure transforms
  {
    const { rackToSaved, applyRackToState, defaultParams: dp2, rackMacroKey: rmk2 } = await import('./js/params.js');
    const rack = { id: 'rk1', name: 'R', deviceIds: ['bloom'],
      macros: [{ name: 'Glow', mappings: [{ key: 'bloomAmount', min: 0, max: 0.8 }] }] };
    const p = { ...dp2(), 'rk1.m1': 0.4, bloomThreshold: 0.5, bloomAmount: 0.32 };
    const saved = rackToSaved(rack, p);
    step('rackToSaved: captures macro default value, omits mapped param from params',
      saved.macros[0].value === 0.4 && saved.params.bloomAmount === undefined
      && saved.params.bloomThreshold === 0.5, JSON.stringify(saved));
    step('rackToSaved: mapped devices are included in the saved rack',
      saved.deviceIds.includes('bloom'), JSON.stringify(saved.deviceIds));
    // apply onto a fresh project
    const res = applyRackToState(saved, { chain: [], params: dp2(), racks: [] });
    step('applyRackToState: adds device, seeds macro value, installs mapping',
      res.chain.includes('bloom')
      && res.racks[0].macros[0].mappings[0].key === 'bloomAmount'
      && res.params[rmk2(res.racks[0].id, 1)] === 0.4, JSON.stringify(res.racks[0]));
    const existing = { id: 'rkOld', name: 'Old', deviceIds: ['bloom'],
      macros: [{ name: 'OldMacro', mappings: [{ key: 'bloomAmount', min: 0, max: 1.5 }] }] };
    const moved = applyRackToState(saved, { chain: ['bloom'], params: dp2(), racks: [existing] }, 'rkNew');
    step('applyRackToState: applying a rack evicts previous device and param owners',
      moved.racks[0].deviceIds.includes('bloom') === false
      && moved.racks[0].macros[0].mappings.length === 0
      && moved.racks[1].id === 'rkNew'
      && moved.racks[1].deviceIds.includes('bloom')
      && moved.racks[1].macros[0].mappings[0].key === 'bloomAmount',
      JSON.stringify(moved.racks));
  }

  const { AutomationSet } = await import('./js/automation.js');
  const captureFrame = (p) => {
    renderer.resetFeedback();
    renderer.render(0.5, 1 / 30, bank.sample(0.5), p, reframe, { toTexture: true });
    return renderer.readPixels().slice();
  };
  const maxDiff = (a, b) => {
    let d = 0;
    for (let i = 0; i < a.length; i += 97) d = Math.max(d, Math.abs(a[i] - b[i]));
    return d;
  };
  const base = defaultParams();
  const warpDiff = maxDiff(
    captureFrame({ ...base, warpOn: false }),
    captureFrame({ ...base, warpOn: true, warpAmount: 0.6, warpMix: 0 }),
  );
  step('intensity 0 == device absent (warp)', warpDiff <= 1, `maxDiff=${warpDiff}`);
  const kalDiff = maxDiff(
    captureFrame({ ...base, kaleidoOn: false }),
    captureFrame({ ...base, kaleidoOn: true, kaleidoMix: 0 }),
  );
  step('intensity 0 == device absent (kaleido)', kalDiff <= 1, `maxDiff=${kalDiff}`);

  // 3c — Auto colour-grade derivation (pure; the GL sampling half lives in
  // main.js). Synthetic histograms exercise the corrections + the null guard.
  const { autoGradeFromStats } = await import('./js/params.js');
  const mkHist = (bins) => {
    const h = new Float32Array(256);
    for (const [bin, w] of bins) h[bin] += w;
    return h;
  };
  const darkG = autoGradeFromStats({
    hist: mkHist([[30, 1000]]), meanR: 0.12, meanG: 0.12, meanB: 0.12, meanSat: 0.3,
  });
  step('auto-grade: dark image raises exposure',
    !!darkG && darkG.exposure > 0.1, `exposure=${darkG && darkG.exposure}`);
  const flatG = autoGradeFromStats({
    hist: mkHist([[120, 500], [135, 500]]), meanR: 0.5, meanG: 0.5, meanB: 0.5, meanSat: 0.3,
  });
  step('auto-grade: flat image raises contrast',
    !!flatG && flatG.contrast > 1.04, `contrast=${flatG && flatG.contrast}`);
  const warmG = autoGradeFromStats({
    hist: mkHist([[128, 1000]]), meanR: 0.6, meanG: 0.45, meanB: 0.3, meanSat: 0.3,
  });
  step('auto-grade: warm cast cools temperature',
    !!warmG && warmG.temperature < 0, `temp=${warmG && warmG.temperature}`);
  step('auto-grade: empty histogram returns null',
    autoGradeFromStats({ hist: new Float32Array(256), meanR: 0, meanG: 0, meanB: 0, meanSat: 0 }) === null);

  // 3d — base-value edits (sliders / reset / Auto) are now undoable: params
  // ride in the history snapshot, committed at the slider-release boundary.
  const iwin = idoc.defaultView;
  const expRow = idoc.querySelector('#paramPanels [data-key="exposure"]');
  const expSlider = expRow && expRow.querySelector('input[type=range]');
  let undoOK = false;
  let diag = 'no exposure slider';
  if (expSlider) {
    const setExp = (val) => {            // a full slider gesture (input + release)
      expSlider.value = String(val);
      expSlider.dispatchEvent(new iwin.Event('input', { bubbles: true }));
      expSlider.dispatchEvent(new iwin.Event('change', { bubbles: true }));
    };
    setExp(0.3);                          // commit A
    setExp(0.6);                          // commit B
    const edited = expSlider.value;
    idoc.body.dispatchEvent(new iwin.KeyboardEvent('keydown', { code: 'KeyZ', ctrlKey: true, bubbles: true }));
    const undone = expSlider.value;       // expect the value from commit A
    undoOK = edited === '0.6' && undone === '0.3';
    diag = `edited=${edited} undone=${undone}`;
  }
  step('base-value slider edit is undoable (Ctrl+Z)', undoOK, diag);

  // 3b' — R5-P1b: Mix 0 must equal device-absent for EVERY device.
  const { PARAM_GROUPS } = await import('./js/params.js');
  const toggled = PARAM_GROUPS.filter((g) => g.toggle);
  const offenders = [];
  for (const g of toggled) {
    const d = maxDiff(
      captureFrame({ ...base, [g.toggle]: false }),
      captureFrame({ ...base, [g.toggle]: true, [g.params[0].key]: 0 }),
    );
    if (d > 1) offenders.push(`${g.id}=${d}`);
  }
  step(`Mix 0 == device absent (all ${toggled.length} devices)`,
    offenders.length === 0, offenders.length ? offenders.join(' ') : 'bit-exact');

  // 3b-canvas — R4-1: Canvas device paints a flat colour (white ≫ black).
  const meanR = (px) => { let s = 0, n = 0; for (let i = 0; i < px.length; i += 400) { s += px[i]; n++; } return s / n; };
  const cWhite = meanR(captureFrame({ ...base, canvasOn: true, canvasMix: 1, canvasSat: 0, canvasLight: 1 }));
  const cBlack = meanR(captureFrame({ ...base, canvasOn: true, canvasMix: 1, canvasSat: 0, canvasLight: 0 }));
  step('canvas device drives a flat colour (white >> black)', cWhite > cBlack + 80,
    `whiteR=${cWhite.toFixed(0)} blackR=${cBlack.toFixed(0)}`);
  // R10-6: gradient fill differs from flat
  const cGrad = captureFrame({ ...base, canvasOn: true, canvasMix: 1, canvasMode: 'gradient', canvasSat: 0, canvasLight: 0, canvasSat2: 0, canvasLight2: 1 });
  const cFlat = captureFrame({ ...base, canvasOn: true, canvasMix: 1, canvasMode: 'flat', canvasSat: 0, canvasLight: 0 });
  step('canvas gradient fill differs from flat', maxDiff(cGrad, cFlat) > 8,
    `diff=${maxDiff(cGrad, cFlat)}`);

  // 3b-master — R7-1: Sharpen, Vibrance, Output soft-clip.
  const sharpD = maxDiff(captureFrame(base),
    captureFrame({ ...base, sharpOn: true, sharpMix: 1, sharpRadius: 1.5 }));
  step('master Sharpen changes the image', sharpD > 1, `diff=${sharpD}`);
  const vibD = maxDiff(captureFrame(base), captureFrame({ ...base, vibrance: 0.9 }));
  step('master grade Vibrance changes colour', vibD > 1, `diff=${vibD}`);
  const oOff = meanR(captureFrame({ ...base, canvasOn: true, canvasMix: 1, canvasLight: 1 }));
  const oOn = meanR(captureFrame({ ...base, canvasOn: true, canvasMix: 1, canvasLight: 1,
    outputOn: true, outputMix: 1, outputCeiling: 0.6 }));
  step('output soft-clip rolls off highlights', oOn < oOff - 8,
    `whiteR ${oOff.toFixed(0)} -> ${oOn.toFixed(0)}`);

  // 3b-creative — R8-5: Colour wash (split-tone) + Clarity (local contrast).
  const washD = maxDiff(captureFrame(base),
    captureFrame({ ...base, washOn: true, washMix: 1, washShadowHue: 200, washHighHue: 38 }));
  step('creative Colour wash tints the image', washD > 1, `diff=${washD}`);
  const clarD = maxDiff(captureFrame(base),
    captureFrame({ ...base, clarityOn: true, clarityMix: 1, clarityRadius: 5 }));
  step('creative Clarity changes the image', clarD > 1, `diff=${clarD}`);

  // 3b-fade — R7-2: the Mix curve eases low values but keeps endpoints.
  const fogOff = captureFrame({ ...base, fogOn: false });
  const fogLin = captureFrame({ ...base, audSmoothness: 0, fogOn: true, fogMix: 0.5, fogDensity: 0.9 });
  const fogCur = captureFrame({ ...base, audSmoothness: 0.6, fogOn: true, fogMix: 0.5, fogDensity: 0.9 });
  step('fade curve eases low Mix (gentler than linear)',
    maxDiff(fogOff, fogCur) > 0 && maxDiff(fogOff, fogCur) < maxDiff(fogOff, fogLin),
    `curved=${maxDiff(fogOff, fogCur)} linear=${maxDiff(fogOff, fogLin)}`);
  const fullLin = captureFrame({ ...base, audSmoothness: 0, fogOn: true, fogMix: 1, fogDensity: 0.9 });
  const fullCur = captureFrame({ ...base, audSmoothness: 0.6, fogOn: true, fogMix: 1, fogDensity: 0.9 });
  step('fade curve leaves fully-wet (mix 1) exact', maxDiff(fullLin, fullCur) === 0,
    `maxDiff=${maxDiff(fullLin, fullCur)}`);

  // 3b'' — R4: generators render, deterministically, and 0 == absent is
  // covered by the matrix above (named generator devices are toggled).
  const julia = { ...base, fractalOn: true, fractalMix: 1, fractalKind: 'julia', fractalSize: 1.2 };
  const genOff = captureFrame(base);
  const genOn = captureFrame(julia);
  const genAgain = captureFrame(julia);
  step('generator renders (Julia non-trivial)', maxDiff(genOff, genOn) > 8,
    `diff=${maxDiff(genOff, genOn)}`);
  step('generator deterministic', maxDiff(genOn, genAgain) === 0,
    `maxDiff=${maxDiff(genOn, genAgain)}`);
  // region mask: count changed samples — a small ellipse must touch far
  // fewer pixels than the unmasked layer
  const changed = (a, b) => {
    let n = 0;
    for (let i = 0; i < a.length; i += 97) if (Math.abs(a[i] - b[i]) > 1) n++;
    return n;
  };
  const masked = captureFrame({ ...julia, fractalMask: 'ellipse', fractalSize: 0.3, fractalX: 0.2, fractalY: 0.8 });
  const fullN = changed(genOff, genOn);
  const maskN = changed(genOff, masked);
  step('generator region mask confines the layer', maskN > 0 && maskN < fullN * 0.5,
    `changed: full=${fullN} masked=${maskN}`);
  // 3b''' — R4-P3b: integrated generators (emerge from the image)
  const fullJulia = changed(genOff, genOn);
  const depthGated = captureFrame({ ...julia, fractalDepthGate: 0.15 });
  const gatedN = changed(genOff, depthGated);
  step('depth gate hides the layer behind near image content',
    gatedN < fullJulia * 0.7, `changed: overlay=${fullJulia} gated=${gatedN}`);
  const inh = captureFrame({ ...julia, fractalInherit: 1 });
  step('inherit tints the pattern with image colour', maxDiff(genOn, inh) > 2,
    `diff=${maxDiff(genOn, inh)}`);
  const disp1 = captureFrame({ ...julia, fractalBlend: 'displace' });
  const disp2 = captureFrame({ ...julia, fractalBlend: 'displace' });
  step('displace blend warps the image (and differs from add)',
    maxDiff(genOff, disp1) > 2 && maxDiff(genOn, disp1) > 2,
    `vsOff=${maxDiff(genOff, disp1)} vsAdd=${maxDiff(genOn, disp1)}`);
  step('displace blend is deterministic', maxDiff(disp1, disp2) === 0,
    `maxDiff=${maxDiff(disp1, disp2)}`);
  const anchored = captureFrame({ ...julia, fractalAnchor: 'image' });
  step('image anchor renders (region glued to the photo)',
    changed(genOff, anchored) > 0, `changed=${changed(genOff, anchored)}`);

  // R4-P6: named generator devices as separate slots — stack two, and the
  // Kind sub-option changes the output.
  const shapeRings = captureFrame({ ...base, shapeOn: true, shapeMix: 1, shapeKind: 'rings', shapeSize: 1.0 });
  const shapeBars = captureFrame({ ...base, shapeOn: true, shapeMix: 1, shapeKind: 'bars', shapeSize: 1.0 });
  step('Shape Pulse Kind changes the output (rings vs bars)',
    maxDiff(shapeRings, shapeBars) > 2, `diff=${maxDiff(shapeRings, shapeBars)}`);
  const stacked = captureFrame({
    ...base, shapeOn: true, shapeMix: 1, shapeKind: 'bars', shapeX: 0.25,
    fractalOn: true, fractalMix: 1, fractalKind: 'julia', fractalX: 0.75,
  });
  step('two named generators stack (separate slots)',
    changed(genOff, stacked) > changed(genOff, genOn),
    `stacked=${changed(genOff, stacked)} single=${changed(genOff, genOn)}`);
  // R10-6 pattern fill: Noise Flow generator renders full-frame
  const flowGen = captureFrame({ ...base, flowOn: true, flowMix: 1, flowKind: 'clouds', flowSize: 1.2 });
  step('Noise Flow generator (pattern fill) renders', maxDiff(genOff, flowGen) > 8,
    `diff=${maxDiff(genOff, flowGen)}`);

  // R4-P7: four new generator devices each render a non-trivial layer.
  const tunnelGen = captureFrame({ ...base, tunnelOn: true, tunnelMix: 1, tunnelKind: 'round', tunnelSize: 1.2 });
  step('Tunnel generator renders', maxDiff(genOff, tunnelGen) > 8, `diff=${maxDiff(genOff, tunnelGen)}`);
  const starGen = captureFrame({ ...base, starfieldOn: true, starfieldMix: 1, starfieldKind: 'stars', starfieldDetail: 0.9, starfieldSize: 1.2 });
  step('Starfield generator renders', maxDiff(genOff, starGen) > 8, `diff=${maxDiff(genOff, starGen)}`);
  const voroGen = captureFrame({ ...base, voronoiOn: true, voronoiMix: 1, voronoiKind: 'cells', voronoiSize: 1.2 });
  step('Voronoi generator renders', maxDiff(genOff, voroGen) > 8, `diff=${maxDiff(genOff, voroGen)}`);
  const waveGen = captureFrame({ ...base, waveformOn: true, waveformMix: 1, waveformKind: 'lissajous', waveformSize: 1.2 });
  step('Waveform generator renders', maxDiff(genOff, waveGen) > 8, `diff=${maxDiff(genOff, waveGen)}`);
  // Kind sub-option changes the output (Voronoi cells vs edges).
  const voroEdges = captureFrame({ ...base, voronoiOn: true, voronoiMix: 1, voronoiKind: 'edges', voronoiSize: 1.2 });
  step('Voronoi Kind changes the output (cells vs edges)',
    maxDiff(voroGen, voroEdges) > 2, `diff=${maxDiff(voroGen, voroEdges)}`);

  // R4-P7 beat-sync: at full sync the pattern clock is beat-quantised, so the
  // frame differs from the free-running clock (and stays deterministic).
  const tunnelFree = captureFrame({ ...base, tunnelOn: true, tunnelMix: 1, tunnelSize: 1.2, tunnelBeatSync: 0 });
  const tunnelSync = captureFrame({ ...base, tunnelOn: true, tunnelMix: 1, tunnelSize: 1.2, tunnelBeatSync: 1 });
  const tunnelSync2 = captureFrame({ ...base, tunnelOn: true, tunnelMix: 1, tunnelSize: 1.2, tunnelBeatSync: 1 });
  step('beat-sync re-clocks the pattern (differs from free clock)',
    maxDiff(tunnelFree, tunnelSync) > 2, `diff=${maxDiff(tunnelFree, tunnelSync)}`);
  step('beat-sync render is deterministic', maxDiff(tunnelSync, tunnelSync2) === 0,
    `maxDiff=${maxDiff(tunnelSync, tunnelSync2)}`);

  // bands16 is sampled at t — scan for a loud moment (t=1.0 can be silent)
  let bandPeak = 0;
  for (let tt = 0; tt < Math.min(bank.duration, 10); tt += 0.2) {
    const bb = bank.sample(tt).bands16;
    for (let i = 0; i < 16; i++) bandPeak = Math.max(bandPeak, bb[i]);
  }
  step('16-band feed for the Spectrum generator',
    bank.sample(0).bands16 instanceof Float32Array && bandPeak > 0.5,
    `peak=${bandPeak.toFixed(2)}`);

  // 3c — Device On/Off automates as a stepped bool lane
  const auto = new AutomationSet(paramIndex());
  auto.addPoint('warpOn', 0, 0);
  auto.addPoint('warpOn', 4, 1);
  const offAt2 = auto.apply(base, 2).warpOn;
  const onAt5 = auto.apply(base, 5).warpOn;
  step('bool lane: Device On automates 0/1', offAt2 === false && onAt5 === true,
    `at2=${offAt2} at5=${onAt5}`);

  // 3c2 — curved segments: quadratic bow + symmetry + serialization roundtrip
  const autoCurve = new AutomationSet(paramIndex());
  autoCurve.addPoint('fogDensity', 0, 0);
  autoCurve.addPoint('fogDensity', 4, 1);
  autoCurve.setCurve('fogDensity', 0, 0.5);
  // v(f) = f² + 2m·f(1−f), m = 0.75  =>  v(0.5) = 0.25 + 0.375 = 0.625
  const vMid = autoCurve.valueAt('fogDensity', 2);
  step('curved segment bows through the midpoint', Math.abs(vMid - 0.625) < 1e-6,
    `v(mid)=${vMid}`);
  // constant curvature: discrete second difference equal on both sides
  const dd = (b) => autoCurve.valueAt('fogDensity', b + 0.4)
    - 2 * autoCurve.valueAt('fogDensity', b)
    + autoCurve.valueAt('fogDensity', b - 0.4);
  step('curve bend is symmetric (constant curvature)',
    Math.abs(dd(1.2) - dd(2.8)) < 1e-9, `dd(left)=${dd(1.2).toFixed(6)} dd(right)=${dd(2.8).toFixed(6)}`);
  const autoRound = new AutomationSet(paramIndex());
  autoRound.load(JSON.parse(JSON.stringify(autoCurve.toJSON())));
  step('curvature survives save/load',
    Math.abs(autoRound.valueAt('fogDensity', 2) - vMid) < 1e-3);

  // 3c2b — movable apex: skewing h shifts the turning point; the curve
  // passes through the dragged apex (t=0.5 point) exactly.
  autoCurve.setCurve('fogDensity', 0, 0.5, 0.25);
  // apex = (0.25 + h/2, 0.25 + k/2) = beats 4×0.375 = 1.5, value 0.625
  const vApex = autoCurve.valueAt('fogDensity', 1.5);
  step('skewed apex: curve passes through the dragged point',
    Math.abs(vApex - 0.625) < 1e-6, `v(1.5)=${vApex}`);
  autoCurve.setCurve('fogDensity', 0, -0.8, 0.9);
  let monotone = true;
  let prev = -1;
  for (let b = 0; b <= 4.001; b += 0.2) {
    const v = autoCurve.valueAt('fogDensity', b);
    if (v < prev - 1e-9) monotone = false;
    prev = v;
  }
  step('skewed curve stays monotone (no overshoot)', monotone);
  autoCurve.setCurve('fogDensity', 0, 0.5, 0.25);
  const autoRound2 = new AutomationSet(paramIndex());
  autoRound2.load(JSON.parse(JSON.stringify(autoCurve.toJSON())));
  step('apex skew survives save/load',
    Math.abs(autoRound2.valueAt('fogDensity', 1.5) - 0.625) < 1e-3);

  // 3c2c — R14-P3: copy / paste automation clips (pure, beats-domain)
  const clipAuto = new AutomationSet(paramIndex());
  clipAuto.addPoint('fogDensity', 0, 0.2);
  clipAuto.addPoint('fogDensity', 1, 0.8);
  clipAuto.addPoint('fogDensity', 2, 0.4);
  const rangeClip = clipAuto.copyRange('fogDensity', 0, 2);
  clipAuto.pasteRange('fogDensity', rangeClip, 8); // anchor the clip at beat 8
  step('copy range then paste reproduces the shape at the new anchor',
    Math.abs(clipAuto.valueAt('fogDensity', 8) - 0.2) < 1e-6
      && Math.abs(clipAuto.valueAt('fogDensity', 9) - 0.8) < 1e-6
      && Math.abs(clipAuto.valueAt('fogDensity', 10) - 0.4) < 1e-6,
    `@8=${clipAuto.valueAt('fogDensity', 8).toFixed(2)} @9=${clipAuto.valueAt('fogDensity', 9).toFixed(2)}`);

  const ovr = new AutomationSet(paramIndex());
  ovr.addPoint('fogDensity', 8, 0.0);
  ovr.addPoint('fogDensity', 9, 0.99);  // inside the paste span — overwritten
  ovr.addPoint('fogDensity', 12, 0.1);  // outside the span — survives
  ovr.pasteRange('fogDensity', rangeClip, 8);
  const ovrPts = ovr.lane('fogDensity').points;
  const ovrAt9 = ovrPts.find((p) => Math.abs(p.b - 9) < 1e-6);
  step('paste overwrites the destination span, keeps outside points',
    ovrAt9 && Math.abs(ovrAt9.v - 0.8) < 1e-6 && ovrPts.some((p) => Math.abs(p.b - 12) < 1e-6),
    `@9=${ovrAt9 ? ovrAt9.v : 'n/a'} count=${ovrPts.length}`);

  const det1 = new AutomationSet(paramIndex()); det1.pasteRange('fogDensity', rangeClip, 4);
  const det2 = new AutomationSet(paramIndex()); det2.pasteRange('fogDensity', rangeClip, 4);
  step('paste is deterministic (identical lane JSON)',
    JSON.stringify(det1.toJSON()) === JSON.stringify(det2.toJSON()));

  // whole-lane copy onto a smaller-range parameter clamps every value
  const idx14 = paramIndex();
  const contKeys = Object.keys(idx14).filter((k) => idx14[k].automatable
    && idx14[k].type !== 'enum' && idx14[k].type !== 'bool');
  const bigKey = contKeys.find((k) => idx14[k].max >= 2);
  const smallKey = contKeys.find((k) => idx14[k].max <= 1 && idx14[k].min >= 0);
  if (bigKey && smallKey) {
    const src = new AutomationSet(paramIndex());
    src.addPoint(bigKey, 0, idx14[bigKey].min);
    src.addPoint(bigKey, 4, idx14[bigKey].max);   // exceeds smallKey's range
    src.pasteLane(smallKey, src.copyLane(bigKey));
    const sp = src.lane(smallKey).points;
    const inRange = sp.every((p) => p.v <= idx14[smallKey].max + 1e-9 && p.v >= idx14[smallKey].min - 1e-9);
    const clamped = sp.some((p) => Math.abs(p.v - idx14[smallKey].max) < 1e-6);
    step('whole-lane paste clamps values to the target range', inRange && clamped,
      `${bigKey}(max ${idx14[bigKey].max}) -> ${smallKey}(max ${idx14[smallKey].max})`);
  } else {
    step('whole-lane paste clamps values to the target range', true, 'skip: no range pair');
  }

  // deleteRange removes only the points inside the band
  const delAuto = new AutomationSet(paramIndex());
  for (let b = 0; b <= 8; b++) delAuto.addPoint('fogDensity', b, 0.5);
  delAuto.deleteRange('fogDensity', 3, 5);
  step('deleteRange removes only the in-band points',
    delAuto.lane('fogDensity').points.every((p) => p.b < 3 - 1e-4 || p.b > 5 + 1e-4)
      && delAuto.lane('fogDensity').points.length === 6,
    `remaining=${delAuto.lane('fogDensity').points.length}`);

  // 3c3 — macro rack: mapped params scan their range; bool maps by threshold
  const { applyMacros } = await import('./js/params.js');
  const rack3c3 = { id: 'rk1', name: 'M', deviceIds: ['warp'],
    macros: [{ name: 'A', mappings: [
      { key: 'warpAmount', min: 0.1, max: 0.9 },
      { key: 'warpOn', min: 0, max: 1 },
    ] }] };
  const atZero = applyMacros({ ...base, 'rk1.m1': 0, warpAmount: 0.5, warpOn: true }, [rack3c3]);
  const atHalf = applyMacros({ ...base, 'rk1.m1': 0.75, warpAmount: 0.5, warpOn: false }, [rack3c3]);
  step('macro scans mapped range (owns the param)',
    Math.abs(atZero.warpAmount - 0.1) < 1e-6 && Math.abs(atHalf.warpAmount - 0.7) < 1e-6,
    `0 -> ${atZero.warpAmount}, 0.75 -> ${atHalf.warpAmount}`);
  step('macro maps Device On by threshold',
    atZero.warpOn === false && atHalf.warpOn === true,
    `0 -> ${atZero.warpOn}, 0.75 -> ${atHalf.warpOn}`);

  // Task 2.1 -- paramIndex emits rack macro entries
  {
    const racks = [{ id: 'rk1', name: 'Psy', deviceIds: [],
      macros: [{ name: 'Swirl', mappings: [] }, { name: 'Glow', mappings: [] }] }];
    const idx = paramIndex(racks);
    step('paramIndex(racks): macro key present + automatable',
      idx['rk1.m1'] && idx['rk1.m1'].automatable === true && idx['rk1.m2'],
      JSON.stringify(idx['rk1.m1'] || null));
    step('paramIndex(racks): label is "Rack . Macro"',
      idx['rk1.m1'].label === 'Swirl' && idx['rk1.m1'].groupLabel === 'Psy',
      `${idx['rk1.m1'].groupLabel} . ${idx['rk1.m1'].label}`);
  }

  // Task 2.2 -- rebuildParamIndex mutates the shared SCHEMA_INDEX in place
  {
    const W = document.getElementById('appFrame').contentWindow;
    const before = W.__rebuild.schema;                 // capture the live object reference
    W.__rebuild.state.racks.push({ id: 'rkTest', name: 'T', deviceIds: [],
      macros: [{ name: 'M1', mappings: [] }] });
    W.__rebuild.run();
    step('rebuildParamIndex adds rack macro key to shared SCHEMA_INDEX in place',
      before['rkTest.m1'] && before['rkTest.m1'].automatable === true
      && W.__rebuild.autoSchema()['rkTest.m1'], JSON.stringify(before['rkTest.m1'] || null));
    // remove the rack and rebuild -> key gone (in-place delete), same object
    W.__rebuild.state.racks.pop();
    W.__rebuild.run();
    step('rebuildParamIndex removes orphan macro key in place',
      before['rkTest.m1'] === undefined && W.__rebuild.schema === before);
  }

  // Task 2.3 -- clearRackLanes drops automation lanes on a rack's macro keys
  {
    const W = document.getElementById('appFrame').contentWindow;
    const rack = { id: 'rkLane', name: 'L', deviceIds: [],
      macros: [{ name: 'M1', mappings: [] }, { name: 'M2', mappings: [] }] };
    // install lanes on rkLane.m1 and rkLane.m2 using the real automation API
    W.__rebuild.automation.addPoint('rkLane.m1', 0, 0.5);
    W.__rebuild.automation.addPoint('rkLane.m2', 0, 0.3);
    step('precondition: rack macro keys have lanes before clearRackLanes',
      W.__rebuild.automation.isAutomated('rkLane.m1')
      && W.__rebuild.automation.isAutomated('rkLane.m2'));
    W.__rebuild.clearRackLanes(rack);
    step('clearRackLanes clears all rack macro lanes',
      !W.__rebuild.automation.isAutomated('rkLane.m1')
      && !W.__rebuild.automation.isAutomated('rkLane.m2'));
    // cleanup: ensure no residual state
    W.__rebuild.automation.clear('rkLane.m1');
    W.__rebuild.automation.clear('rkLane.m2');
  }

  // Task 3.1 -- rack CRUD: createRack / deleteRack / renameRack
  {
    const W = document.getElementById('appFrame').contentWindow;
    const r = W.__racks.createRack('Psy');
    step('createRack: unique rk id + 1 empty macro + seeds value param 0',
      /^rk\d+$/.test(r.id) && r.macros.length === 1 && r.macros[0].mappings.length === 0
      && W.__racks.state.params[`${r.id}.m1`] === 0, JSON.stringify({ id: r.id, m: r.macros.length }));
    const before = W.__racks.state.racks.length;
    W.__racks.deleteRack(r.id);
    step('deleteRack removes it + drops its macro value param',
      W.__racks.state.racks.length === before - 1 && W.__racks.state.params[`${r.id}.m1`] === undefined);
    const r2 = W.__racks.createRack('Old'); W.__racks.renameRack(r2.id, 'New');
    step('renameRack updates name', r2.name === 'New');
    W.__racks.deleteRack(r2.id);
  }

  // Rack cap: projects are limited to four rack cards.
  {
    const W = document.getElementById('appFrame').contentWindow;
    const idoc = document.getElementById('appFrame').contentDocument;
    const made = [];
    for (let i = 0; i < 4; i++) made.push(W.__racks.createRack(`Cap ${i + 1}`));
    const fifth = W.__racks.createRack('Too many');
    step('createRack enforces the 4-rack project limit',
      made.every(Boolean) && fifth === null && W.__racks.state.racks.length === 4
      && !idoc.querySelector('[data-add-rack]'),
      `count=${W.__racks.state.racks.length}`);
    for (const r of made) W.__racks.deleteRack(r.id);
  }

  // Task 3.2 -- device membership ops: a device belongs to at most one rack
  {
    const W = document.getElementById('appFrame').contentWindow;
    const a = W.__racks.createRack('A'); const b = W.__racks.createRack('B');
    W.__racks.addDeviceToRack(a.id, 'bloom');
    W.__racks.addDeviceToRack(b.id, 'bloom'); // must move, not duplicate
    step('a device belongs to at most one rack',
      a.deviceIds.includes('bloom') === false && b.deviceIds.includes('bloom') === true);
    const kept = W.__racks.addDeviceToRack('missing-rack', 'bloom') === false
      && b.deviceIds.includes('bloom');
    step('addDeviceToRack: missing target does not evict existing owner', kept);
    W.__racks.deleteRack(a.id); W.__racks.deleteRack(b.id);
  }

  // Task 3.3 -- rack-scoped mapping + Map mode + addMacro
  {
    const W = document.getElementById('appFrame').contentWindow;
    const r = W.__racks.createRack('M');
    W.__racks.mapParamToMacro(r.id, 0, 'bloomAmount');
    step('mapParamToMacro: exclusive ownership + full-range default',
      r.macros[0].mappings.length === 1
      && r.macros[0].mappings[0].key === 'bloomAmount'
      && r.macros[0].mappings[0].min === 0 && r.macros[0].mappings[0].max === 1.5, JSON.stringify(r.macros[0].mappings));
    step('mapParamToMacro: mapping a param claims its device for the rack',
      r.deviceIds.includes('bloom'), JSON.stringify(r.deviceIds));
    // re-map the SAME param to the SAME macro → must not duplicate
    W.__racks.mapParamToMacro(r.id, 0, 'bloomAmount'); // same macro: no dup
    step('no duplicate mapping on the same macro', r.macros[0].mappings.length === 1);
    // exclusive ownership ACROSS racks: mapping bloomAmount into a 2nd rack
    // must evict it from the first rack's macro.
    const r2 = W.__racks.createRack('M2');
    W.__racks.mapParamToMacro(r2.id, 0, 'bloomAmount');
    step('mapParamToMacro evicts a param from its previous rack/macro',
      r.macros[0].mappings.length === 0
      && r2.macros[0].mappings.length === 1
      && r2.macros[0].mappings[0].key === 'bloomAmount',
      `r1=${r.macros[0].mappings.length} r2=${r2.macros[0].mappings.length}`);
    W.__racks.deleteRack(r2.id);
    W.__racks.deleteRack(r.id);
  }

  // (Rack UI parked: the "+ macro" DOM affordance no longer renders, so the
  // slot-limit UI test is retired. Engine cap logic is reachable again when
  // racks are revived.)

  // Final review fix -- removing a rack device clears its mappings too
  {
    const W = document.getElementById('appFrame').contentWindow;
    const r = W.__racks.createRack('Detach');
    W.__racks.mapParamToMacro(r.id, 0, 'warpAmount');
    W.__racks.removeDeviceFromRack(r.id, 'warp');
    step('removeDeviceFromRack: drops mappings owned by that device',
      !r.deviceIds.includes('warp') && r.macros[0].mappings.every((mm) => mm.key !== 'warpAmount'),
      JSON.stringify(r));
    W.__racks.deleteRack(r.id);
  }

  // 3c4 -- rack-aware applyMacros: macro value keyed by rack id
  {
    const racks = [{ id: 'rk1', name: 'R', deviceIds: ['bloom'],
      macros: [{ name: 'A', mappings: [{ key: 'bloomAmount', min: 0, max: 0.8 }] }] }];
    const base4 = { ...defaultParams(), bloomAmount: 0.1, 'rk1.m1': 0.5 };
    const out = applyMacros(base4, racks);
    step('applyMacros: macro drives mapped param (0.5 of 0..0.8 = 0.4)',
      Math.abs(out.bloomAmount - 0.4) < 1e-6, `bloomAmount=${out.bloomAmount}`);
    step('applyMacros is pure (input unmutated)', base4.bloomAmount === 0.1);
    const out2 = applyMacros({ ...base4, 'rk1.m1': 0.5 }, racks);
    step('applyMacros deterministic', out2.bloomAmount === out.bloomAmount);
  }

  // Item 1 -- mapping correctness: bool threshold/invert, enum sub-range,
  // numeric custom range, and normalizeMapping migration (pure).
  {
    const { applyMacros, normalizeMapping, paramIndex } = await import('./js/params.js');
    const idxM = paramIndex();

    // bool: custom threshold flips on at/above the threshold
    const boolRack = { id: 'rkB', name: 'B', deviceIds: ['warp'],
      macros: [{ name: 'T', mappings: [{ key: 'warpOn', threshold: 0.7, invert: false }] }] };
    const b40 = applyMacros({ 'rkB.m1': 0.4, warpOn: false }, [boolRack]).warpOn;
    const b80 = applyMacros({ 'rkB.m1': 0.8, warpOn: false }, [boolRack]).warpOn;
    step('bool mapping: custom threshold flips at 0.7',
      b40 === false && b80 === true, `at0.4=${b40} at0.8=${b80}`);

    // bool: invert reverses the crossover (on below threshold)
    const invRack = { id: 'rkI', name: 'I', deviceIds: ['warp'],
      macros: [{ name: 'T', mappings: [{ key: 'warpOn', threshold: 0.5, invert: true }] }] };
    const i20 = applyMacros({ 'rkI.m1': 0.2, warpOn: false }, [invRack]).warpOn;
    const i80 = applyMacros({ 'rkI.m1': 0.8, warpOn: false }, [invRack]).warpOn;
    step('bool mapping: invert reverses (on below threshold)',
      i20 === true && i80 === false, `at0.2=${i20} at0.8=${i80}`);

    // legacy bool mapping ({min,max}, no threshold) still resolves at 0.5
    const legacyRack = { id: 'rkL', name: 'L', deviceIds: ['warp'],
      macros: [{ name: 'T', mappings: [{ key: 'warpOn', min: 0, max: 1 }] }] };
    const l40 = applyMacros({ 'rkL.m1': 0.4, warpOn: false }, [legacyRack]).warpOn;
    const l60 = applyMacros({ 'rkL.m1': 0.6, warpOn: false }, [legacyRack]).warpOn;
    step('bool mapping: legacy min/max defaults to threshold 0.5',
      l40 === false && l60 === true, `at0.4=${l40} at0.6=${l60}`);

    // normalizeMapping migrates legacy bool -> {threshold, invert}, drops min/max
    const nb = normalizeMapping({ key: 'warpOn', min: 0, max: 1 }, idxM.warpOn);
    step('normalizeMapping: legacy bool -> threshold 0.5 / invert false, no min/max',
      nb.threshold === 0.5 && nb.invert === false
        && nb.min === undefined && nb.max === undefined, JSON.stringify(nb));

    // normalizeMapping bare {key} -> full numeric schema range
    const nNum = normalizeMapping({ key: 'bloomAmount' }, idxM.bloomAmount);
    step('normalizeMapping: numeric bare key -> full schema range',
      Math.abs(nNum.min - idxM.bloomAmount.min) < 1e-6
        && Math.abs(nNum.max - idxM.bloomAmount.max) < 1e-6, JSON.stringify(nNum));

    // numeric custom range scans that range
    const numRack = { id: 'rkN', name: 'N', deviceIds: ['bloom'],
      macros: [{ name: 'T', mappings: [{ key: 'bloomAmount', min: 0.2, max: 0.6 }] }] };
    const n0 = applyMacros({ 'rkN.m1': 0, bloomAmount: 0 }, [numRack]).bloomAmount;
    const n1 = applyMacros({ 'rkN.m1': 1, bloomAmount: 0 }, [numRack]).bloomAmount;
    step('numeric mapping: scans custom range 0.2..0.6',
      Math.abs(n0 - 0.2) < 1e-6 && Math.abs(n1 - 0.6) < 1e-6, `at0=${n0} at1=${n1}`);

    // enum sub-range scans only the chosen options
    const enumKey = Object.keys(idxM).find(
      (k) => idxM[k].type === 'enum' && idxM[k].options && idxM[k].options.length >= 4);
    if (enumKey) {
      const opts = idxM[enumKey].options;
      const enRack = { id: 'rkE', name: 'E', deviceIds: [],
        macros: [{ name: 'T', mappings: [{ key: enumKey, min: 1, max: 2 }] }] };
      const e0 = applyMacros({ 'rkE.m1': 0, [enumKey]: opts[0] }, [enRack])[enumKey];
      const e1 = applyMacros({ 'rkE.m1': 1, [enumKey]: opts[0] }, [enRack])[enumKey];
      step('enum mapping: sub-range scans only options 1..2',
        e0 === opts[1] && e1 === opts[2], `at0=${e0} at1=${e1}`);
    } else {
      step('enum mapping: sub-range scans only options 1..2', true, 'skip: no enum param');
    }

    // sanitizeRacks keeps a bool mapping that has no min/max (regression vs the
    // old Number.isFinite(min/max) filter) and normalizes it.
    {
      const W = document.getElementById('appFrame').contentWindow;
      const cleaned = W.__racks.sanitizeRacks([{
        id: 'rkS', name: 'S', deviceIds: ['warp'],
        macros: [{ name: 'T', mappings: [
          { key: 'warpOn', threshold: 0.7, invert: true },   // new bool shape
          { key: 'bloomAmount', min: 0.2, max: 0.6 },        // numeric
          { key: 'doesNotExist', min: 0, max: 1 },           // dropped
        ] }],
      }]);
      const maps = cleaned[0].macros[0].mappings;
      const boolM = maps.find((m) => m.key === 'warpOn');
      step('sanitizeRacks keeps + normalizes a bool mapping without min/max',
        !!boolM && boolM.threshold === 0.7 && boolM.invert === true
          && maps.length === 2, JSON.stringify(maps));
    }

    // applyRackToState normalizes a legacy bool mapping inside a saved rack
    {
      const { applyRackToState, defaultParams: dp3 } = await import('./js/params.js');
      const savedLegacy = { name: 'Legacy', deviceIds: ['warp'],
        params: {}, macros: [{ name: 'T', value: 0,
          mappings: [{ key: 'warpOn', min: 0, max: 1 }] }] };  // legacy bool
      const res = applyRackToState(savedLegacy, { chain: [], params: dp3(), racks: [] }, 'rkA');
      const m = res.racks[0].macros[0].mappings[0];
      step('applyRackToState normalizes legacy bool mapping to threshold/invert',
        m.threshold === 0.5 && m.invert === false
          && m.min === undefined && m.max === undefined, JSON.stringify(m));
    }
  }

  // Item 1 (engine) -- mapping edit logic (updateMapping/resetMapping/undo)
  // exercised at state level via the rack functions. The rack editor UI is
  // parked (WIP), but the engine these tests cover stays live for revival.
  {
    const W = document.getElementById('appFrame').contentWindow;
    const { applyMacros } = await import('./js/params.js');

    // numeric bound edit -> applyMacros scans the new range
    const rN = W.__racks.createRack('EditNum');
    W.__racks.mapParamToMacro(rN.id, 0, 'bloomAmount');     // numeric, default 0..1.5
    W.__racks.updateMapping(rN.id, 0, 0, { min: 0.2, max: 0.6 });
    const key = `${rN.id}.m1`;
    const lo = applyMacros({ [key]: 0, bloomAmount: 0 }, W.__racks.state.racks).bloomAmount;
    const hi = applyMacros({ [key]: 1, bloomAmount: 0 }, W.__racks.state.racks).bloomAmount;
    step('mapping edit: numeric bound edit changes the scanned range',
      Math.abs(lo - 0.2) < 1e-6 && Math.abs(hi - 0.6) < 1e-6, `lo=${lo} hi=${hi}`);

    // commit clamps lo < hi (entering lo above hi is rejected back to valid)
    W.__racks.updateMapping(rN.id, 0, 0, { min: 0.9 });     // 0.9 >= hi 0.6 -> normalize resets to schema range (0..1.5)
    const m0 = rN.macros[0].mappings[0];
    step('mapping edit: lo >= hi is rejected (kept valid, lo < hi)',
      m0.min < m0.max, JSON.stringify(m0));
    W.__racks.deleteRack(rN.id);

    // bool threshold + invert (engine keeps both for revival)
    const rB = W.__racks.createRack('EditBool');
    W.__racks.mapParamToMacro(rB.id, 0, 'warpOn');
    const bKey = `${rB.id}.m1`;
    W.__racks.updateMapping(rB.id, 0, 0, { threshold: 0.7 });
    const onAt60 = applyMacros({ [bKey]: 0.6, warpOn: false }, W.__racks.state.racks).warpOn;
    const onAt80 = applyMacros({ [bKey]: 0.8, warpOn: false }, W.__racks.state.racks).warpOn;
    step('mapping edit: bool threshold edit moves the on/off point to 0.7',
      onAt60 === false && onAt80 === true, `at0.6=${onAt60} at0.8=${onAt80}`);
    W.__racks.updateMapping(rB.id, 0, 0, { invert: true });   // threshold 0.7 preserved (merge)
    const invAt60 = applyMacros({ [bKey]: 0.6, warpOn: false }, W.__racks.state.racks).warpOn;
    const invAt80 = applyMacros({ [bKey]: 0.8, warpOn: false }, W.__racks.state.racks).warpOn;
    step('mapping edit: bool invert reverses (on below threshold, off above); threshold preserved',
      invAt60 === true && invAt80 === false, `at0.6(inv)=${invAt60} at0.8(inv)=${invAt80}`);
    W.__racks.deleteRack(rB.id);

    // reset returns bounds to schema defaults
    const rR = W.__racks.createRack('EditReset');
    W.__racks.mapParamToMacro(rR.id, 0, 'bloomAmount');
    W.__racks.updateMapping(rR.id, 0, 0, { min: 0.3, max: 0.4 });
    W.__racks.resetMapping(rR.id, 0, 0);
    const mr = rR.macros[0].mappings[0];
    step('mapping edit: reset restores schema default range',
      Math.abs(mr.min - 0) < 1e-6 && Math.abs(mr.max - 1.5) < 1e-6, JSON.stringify(mr));
    W.__racks.deleteRack(rR.id);

    // undo reverts a mapping bound edit
    const rU = W.__racks.createRack('EditUndo');
    W.__racks.mapParamToMacro(rU.id, 0, 'bloomAmount');
    W.__racks.updateMapping(rU.id, 0, 0, { min: 0.25, max: 0.75 });
    const beforeUndo = JSON.stringify(rU.macros[0].mappings[0]);
    W.__undo();
    const afterRack = W.__racks.state.racks.find((x) => x.id === rU.id);
    const afterUndo = afterRack && JSON.stringify(afterRack.macros[0].mappings[0]);
    step('mapping edit: Ctrl+Z reverts a mapping bound edit',
      beforeUndo.includes('0.25') && afterUndo && !afterUndo.includes('0.25'),
      `before=${beforeUndo} after=${afterUndo}`);
    const cleanup = W.__racks.state.racks.find((x) => x.id === rU.id);
    if (cleanup) W.__racks.deleteRack(rU.id);
  }

  const macroRackEl = idoc.getElementById('macroRack');
  // R9-3: with no project the rack shows the empty state; cells/quartet/follow
  // live in the macro rack only once a project is loaded (verified via the
  // headless macro-logic tests above, which don't need the DOM).
  step('macro rack present', !!macroRackEl);
  step('device panel resize handle present', !!idoc.getElementById('rightResize'));
  step('loop button + export range present',
    !!idoc.getElementById('loopBtn') && !!idoc.getElementById('exportRange'));
  // R14: timeline mode toggle + Fit control wired into the lane cluster
  step('timeline Draw/Move toggle + Fit control present',
    !!idoc.getElementById('modeMoveBtn') && !!idoc.getElementById('modeDrawBtn')
      && !!idoc.getElementById('fitBtn'));

  // 3d — per-parameter modulation matrix (pure function + render determinism)
  const { applyModulation } = await import('./js/features.js');
  const synth = { low: 0.5, mid: 0, high: 0, rms: 0, onset: 0, beats: 0, beatPhase: 0 };
  const modded = applyModulation({ ...base, warpAmount: 0.2, 'warpAmount~low': 0.4 }, synth);
  step('per-param modulation shifts its target', Math.abs(modded.warpAmount - 0.4) < 1e-6,
    `0.2 + 0.4×0.5×span -> ${modded.warpAmount}`);
  const negMod = applyModulation({ ...base, vigAmount: 0.5, 'vigAmount~low': -0.4 }, synth);
  step('bipolar depths duck on energy', Math.abs(negMod.vigAmount - 0.3) < 1e-6,
    `0.5 - 0.4×0.5×span -> ${negMod.vigAmount}`);

  // 3d2 — modulation thresholds & gate
  const synthQuiet = { low: 0.3, mid: 0, high: 0, rms: 0, onset: 0, beats: 0, beatPhase: 0 };
  const synthLoud = { low: 0.8, mid: 0, high: 0, rms: 0, onset: 0, beats: 0, beatPhase: 0 };
  const pTh = { ...base, warpAmount: 0.2, 'warpAmount~low': 0.5, 'warpAmount~low@th': 0.5 };
  const below = applyModulation(pTh, synthQuiet).warpAmount;
  const above = applyModulation(pTh, synthLoud).warpAmount;
  step('threshold: silent below, re-scaled ramp above',
    Math.abs(below - 0.2) < 1e-9 && Math.abs(above - 0.5) < 1e-9,
    `below=${below} above=${above}`);
  const gated = applyModulation(
    { ...pTh, 'warpAmount~low@gate': 1 },
    { ...synthQuiet, low: 0.6 },
  ).warpAmount;
  step('gate: full depth once over the threshold',
    Math.abs(gated - 0.7) < 1e-9, `v=${gated}`);

  // 3d3 — R5: master Reactivity + generated quartet + device contract UI
  const pReact = { ...base, warpAmount: 0.2, 'warpAmount~low': 0.4 };
  const reactHalf = applyModulation({ ...pReact, audReact: 0.5 }, synth).warpAmount;
  const reactOff = applyModulation({ ...pReact, audReact: 0 }, synth).warpAmount;
  step('master Reactivity scales every modulation depth',
    Math.abs(reactHalf - 0.3) < 1e-6 && Math.abs(reactOff - 0.2) < 1e-9,
    `×0.5 -> ${reactHalf}, ×0 -> ${reactOff}`);
  const { buildQuartet, defaultChain } = await import('./js/params.js');
  const quartet = buildQuartet(defaultChain(), { ...base, grainAmount: 0.2 });
  const texKnob = quartet.find((m) => m.name === 'Texture');
  const grainMap = texKnob.mappings.find((mm) => mm.key === 'grainAmount');
  const energyKnob = quartet.find((m) => m.name === 'Energy');
  step('quartet: knob 0 = fully dry, mapped dry -> sweet-hi',
    quartet.length === 4 && quartet.every((m) => m.mappings.length > 0)
      && !!grainMap && grainMap.min === 0 && Math.abs(grainMap.max - 0.55) < 1e-6,
    quartet.map((m) => `${m.name}=${m.mappings.length}`).join(' '));
  step('quartet: knobs start at the current look',
    Math.abs(texKnob.value - 0.37) < 0.011    // grain 0.2/0.55, ca 0.15/0.4
      && energyKnob.value > 0.85
      && energyKnob.mappings.some((mm) => mm.key.endsWith('Mix')),
    `Texture=${texKnob.value} Energy=${energyKnob.value}`);
  step('device More… disclosure present (adv folded)',
    idoc.querySelectorAll('.more-btn').length >= 2
      && [...idoc.querySelectorAll('.adv-body')].every((a) => a.hidden));

  const pm = { ...base, vhsOn: true, fogOn: true };
  const detDiff = maxDiff(captureFrame(pm), captureFrame(pm));
  step('modulated render is deterministic', detDiff === 0, `maxDiff=${detDiff}`);

  // 3e — new device packs: intensity 0 == absent, and determinism when on
  const newOff = captureFrame({ ...base });
  const newZero = captureFrame({
    ...base,
    lensOn: true, lensMix: 0, lensFish: 0.8, lensTwirl: 0.5,
    glitchOn: true, glitchMix: 0, glBlock: 0.8, glSlice: 0.8, glStreak: 0.5,
    zbOn: true, zbMix: 0, zbAmount: 0.8,
    rippleOn: true, rippleMix: 0, ripAmount: 0.9,
    pixelOn: true, pixelMix: 0, pxAmount: 0.8, pxPosterize: 0.8,
    strobeOn: true, strobeMix: 0, strAmount: 1, strFlash: 1,
  });
  const newDiff = maxDiff(newOff, newZero);
  step('new devices: intensity 0 == absent (lens/glitch/zb/ripple/pixel/strobe)',
    newDiff <= 1, `maxDiff=${newDiff}`);
  const allOn = {
    ...base,
    lensOn: true, lensFish: 0.5, glitchOn: true, zbOn: true, zbAmount: 0.3,
    rippleOn: true, dofOn: true, dofAmount: 0.8, pixelOn: true,
    htOn: true, htMix: 0.6, edgeOn: true, edgeMix: 0.4, strobeOn: true,
  };
  const newDet = maxDiff(captureFrame(allOn), captureFrame(allOn));
  step('new devices render deterministically', newDet === 0, `maxDiff=${newDet}`);
  const dofDiff = maxDiff(captureFrame({ ...base }), captureFrame({ ...base, dofOn: true, dofAmount: 1, dofRange: 0.05, dofFocus: 1 }));
  step('depth of field blurs out-of-focus regions', dofDiff > 2, `maxDiff=${dofDiff}`);

  // 3f — user-definable crossovers re-route the multiband set
  const { FeatureBank: FB } = await import('./js/features.js');
  const frames = 100;
  const flat = new Array(frames).fill(0);
  const ramp = Array.from({ length: frames }, (_, i) => i / (frames - 1));
  const bandsArr = Array.from({ length: 16 }, (_, bi) => (bi === 3 ? ramp : flat));
  const edges = Array.from({ length: 17 }, (_, i) => 30 * Math.pow(10000 / 30, i / 16));
  const synthAnalysis = {
    frameRate: 50, frames, duration: 2, tempo: 120, beatOffset: 0,
    rms: flat, low: flat, mid: flat, high: flat, onsetEnv: flat,
    onsets: [], sections: [0], triggers: { overall: [], low: [], mid: [], high: [] },
    bands: bandsArr, bandEdges: edges,
  };
  // band 3 centre ≈ 107 Hz: 'low' with the default 160 Hz crossover…
  const fb = new FB(synthAnalysis);
  fb.setResponse({ attackMs: 0, releaseMs: 20, lowMidHz: 160, midHighHz: 2000 });
  const sLow = fb.sample(1.0);
  // …and 'mid' when the crossover drops to 60 Hz
