  fb.setResponse({ attackMs: 0, releaseMs: 20, lowMidHz: 60, midHighHz: 2000 });
  const sMid = fb.sample(1.0);
  step('crossovers re-route the multiband set',
    sLow.low > 0.3 && sLow.mid < 0.05 && sMid.low < 0.05 && sMid.mid > 0.3,
    `low@160=${sLow.low.toFixed(2)} mid@60=${sMid.mid.toFixed(2)}`);

  // Task 3.4 -- autoRack: one-click quartet rack from the current chain
  {
    const W = document.getElementById('appFrame').contentWindow;
    const before = W.__racks.state.racks.length;
    const r = W.__racks.autoRack();
    step('autoRack creates a quartet rack (4 macros named Energy..Colour)',
    W.__racks.state.racks.length === before + 1 && r.macros.length === 4
      && r.macros.map((m) => m.name).join(',') === 'Energy,Motion,Texture,Colour', r.macros.map((m) => m.name).join(','));
    step('autoRack builds per-macro mappings (Energy owns audReact; Motion mapped)',
      r.macros[0].mappings.some((mm) => mm.key === 'audReact')
      && r.macros[1].mappings.length > 0
      && r.macros.every((m) => m.mappings.length > 0),
      r.macros.map((m) => `${m.name}=${m.mappings.length}`).join(' '));
    W.__racks.deleteRack(r.id);
  }

  // Task 3.6 -- end-to-end: rack macro drives its mapped param through applyMacros
  {
    const W = document.getElementById('appFrame').contentWindow;
    const { applyMacros, paramIndex } = await import('./js/params.js');
    const r = W.__racks.createRack('Auto');
    W.__racks.mapParamToMacro(r.id, 0, 'bloomAmount');   // bloomAmount range is 0..1.5
    const key = `${r.id}.m1`;

    // END-TO-END: the macro value drives its mapped param through applyMacros.
    // macro=0 → fully dry (0); macro=1 → mapped max (1.5).
    const dry  = applyMacros({ [key]: 0 }, W.__racks.state.racks).bloomAmount;
    const full = applyMacros({ [key]: 1 }, W.__racks.state.racks).bloomAmount;
    step('rack macro drives its mapped param end-to-end (0→dry, 1→full range)',
      Math.abs(dry - 0) < 1e-6 && Math.abs(full - 1.5) < 1e-6,
      `dry=${dry}, full=${full}`);

    // the rack macro key is a real, automatable schema entry (lane editor target)
    const idx2 = paramIndex(W.__racks.state.racks);
    step('lane editor can target the rack macro',
      !!idx2[key] && idx2[key].automatable === true, JSON.stringify(idx2[key] || null));

    W.__racks.deleteRack(r.id);
  }

  // Task 5.1 -- session payload carries racks (not macros/macroCount)
  {
    const W = document.getElementById('appFrame').contentWindow;
    const r = W.__racks.createRack('Persisted');
    const payload = JSON.parse(W.__buildSessionPayload ? W.__buildSessionPayload() : '{}');
    step('session payload carries racks (not macros/macroCount)',
      Array.isArray(payload.racks) && payload.macros === undefined
      && payload.racks.some((x) => x.name === 'Persisted'));
    step('session payload omits snapshots', payload.snapshots === undefined,
      JSON.stringify(Object.keys(payload)));
    step('state has no snapshots field', W.__racks.state.snapshots === undefined);
    W.__racks.deleteRack(r.id);
  }

  // Task 5.2 -- undo covers rack create + rack rename
  {
    const W = document.getElementById('appFrame').contentWindow;
    const n0 = W.__racks.state.racks.length;
    const r = W.__racks.createRack('UndoMe');           // commits history
    const n1 = W.__racks.state.racks.length;
    W.__undo();                                          // revert the create
    step('Ctrl+Z reverts a rack create',
      W.__racks.state.racks.length === n0 && n1 === n0 + 1);
    // rename-undo: create, rename, undo → name reverts
    const r2 = W.__racks.createRack('Before');
    W.__racks.renameRack(r2.id, 'After');               // must commit history
    const renamed = W.__racks.state.racks.find((x) => x.id === r2.id).name;
    W.__undo();                                          // revert the rename
    const reverted = W.__racks.state.racks.find((x) => x.id === r2.id);
    step('Ctrl+Z reverts a rack rename',
      renamed === 'After' && !!reverted && reverted.name === 'Before');
    W.__undo();                                          // revert the create of r2
    // tidy any leftover test racks
    for (const x of W.__racks.state.racks.filter((x) => ['Before','After','UndoMe'].includes(x.name))) W.__racks.deleteRack(x.id);
  }

  // 4 — a tiny real export through the actual WebSocket + ffmpeg path,
  // using a range (start offset) like the loop-region export does
  const shortBank = { duration: 1.5, sample: (t) => bank.sample(t) };
  const summary = await runExport({
    renderer, bank: shortBank, params, reframe, projectId: pid,
    start: 0.25, duration: 1.0,
    width: 192, height: 108, fps: 24, quality: 'standard',
    onProgress: () => {},
    shouldAbort: () => false,
  });
  step('browser-side range export produced MP4', !!summary.file && summary.size > 5000,
    `${summary.file} (${summary.size} B)`);
}

main()
  .catch((e) => step('unhandled', false, `${e.message} :: ${(e.stack || '').split('\n')[1] || ''}`))
  .finally(async () => {
    document.title = report.failed ? 'SMOKE-FAIL' : 'SMOKE-PASS';
    await post('smoke-result');
  });
</script>
</body>
</html>
